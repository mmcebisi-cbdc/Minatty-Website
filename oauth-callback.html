<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signing you in... - Minatty Learning Hub</title>
    <link rel="icon" type="image/svg+xml" href="images/logo_white.svg">
    <link rel="stylesheet" href="index.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f0f4ff 0%, #fafafa 100%);
        }

        .callback-card {
            text-align: center;
            padding: 48px 40px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.08);
            max-width: 400px;
            width: 90%;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #e5e7eb;
            border-top-color: var(--color-primary, #4f46e5);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        h2 {
            font-size: 1.3rem;
            color: var(--color-text);
            margin-bottom: 8px;
        }

        p {
            color: #6b7280;
            font-size: 0.95rem;
        }

        .error-box {
            display: none;
            color: #dc2626;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 12px 16px;
            margin-top: 16px;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div class="callback-card">
        <div class="spinner"></div>
        <h2>Signing you in with Google…</h2>
        <p>Please wait while we set up your account.</p>
        <div id="errorBox" class="error-box"></div>
    </div>

    <script type="module">
        import auth from './js/auth.js';

        async function handleCallback() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const error = urlParams.get('error');
            const errorBox = document.getElementById('errorBox');

            if (error) {
                errorBox.textContent = 'Authentication failed. Please try again.';
                errorBox.style.display = 'block';
                setTimeout(() => window.location.href = 'login.html', 3000);
                return;
            }

            if (!token) {
                errorBox.textContent = 'No authentication token received.';
                errorBox.style.display = 'block';
                setTimeout(() => window.location.href = 'login.html', 3000);
                return;
            }

            try {
                // Store the token immediately
                localStorage.setItem('token', token);

                // Fetch the user's latest data using the token
                const user = await auth.refreshUser();

                if (user) {
                    // Success! Redirect to home page
                    window.location.href = 'index.html';
                } else {
                    throw new Error("Failed to fetch user profile");
                }
            } catch (err) {
                console.error(err);
                // Clear any partial state
                localStorage.removeItem('token');
                errorBox.textContent = 'Failed to load profile. Please sign in again.';
                errorBox.style.display = 'block';
                setTimeout(() => window.location.href = 'login.html', 3000);
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', handleCallback);
    </script>
</body>

</html>
