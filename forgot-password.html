<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Minatty Application</title>
    <link rel="stylesheet" href="index.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 30px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--color-border);
            border-radius: 8px;
            font-size: 1rem;
        }

        .error-message {
            color: #ef4444;
            margin-bottom: 15px;
            display: none;
        }

        .success-message {
            color: #10b981;
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>

<body>
    <header id="header">
        <div class="container header-content">
            <a href="index.html" class="logo">Minatty</a>
        </div>
    </header>

    <div class="auth-container">
        <h2 style="margin-bottom: 25px; text-align: center;">Reset Password</h2>
        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <form id="forgotForm">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" id="email" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Send Reset Link</button>
        </form>

        <div style="margin-top: 20px; text-align: center;">
            <a href="login.html" style="color: var(--color-primary);">Back to Login</a>
        </div>
    </div>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');

            try {
                const response = await fetch('http://localhost:5000/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (response.ok) {
                    successDiv.textContent = 'Reset link sent (Check console for token)';
                    successDiv.style.display = 'block';
                    errorDiv.style.display = 'none';
                    console.log('Use this token to reset:', data.demoToken);
                    // For demo flow, we might redirect with token, but let's just show msg
                    setTimeout(() => {
                        window.location.href = `reset-password.html?token=${data.demoToken}`;
                    }, 2000);
                } else {
                    errorDiv.textContent = data.error || 'Request failed';
                    errorDiv.style.display = 'block';
                    successDiv.style.display = 'none';
                }
            } catch (err) {
                errorDiv.textContent = 'Server error';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>

</html>
