<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Timezone Clock</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            flex-direction: column;\n            height: 100vh;\n            background-color: #f4f4f4;\n        }\n        .clock {\n            font-size: 2em;\n            margin: 20px;\n        }\n    </style>\n</head>\n<body>\n    <div class="clock">UTC: <span id="utc-time"></span></div>\n    <div class="clock">New York: <span id="ny-time"></span></div>\n    <div class="clock">London: <span id="london-time"></span></div>\n    <div class="clock">Tokyo: <span id="tokyo-time"></span></div>\n    <script>\n        function updateClocks() {\n            const utcDate = new Date();\n            document.getElementById('utc-time').innerText = utcDate.toUTCString();\n            const newYorkDate = new Date(utcDate.toLocaleString('en-US', { timeZone: 'America/New_York' }));\n            document.getElementById('ny-time').innerText = newYorkDate.toLocaleTimeString();\n            const londonDate = new Date(utcDate.toLocaleString('en-GB', { timeZone: 'Europe/London' }));\n            document.getElementById('london-time').innerText = londonDate.toLocaleTimeString();\n            const tokyoDate = new Date(utcDate.toLocaleString('ja-JP', { timeZone: 'Asia/Tokyo' }));\n            document.getElementById('tokyo-time').innerText = tokyoDate.toLocaleTimeString();\n        }\n        setInterval(updateClocks, 1000);\n        updateClocks();\n    </script>\n</body>\n</html>
